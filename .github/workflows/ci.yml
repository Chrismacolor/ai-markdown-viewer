name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # tags needed for version stamping

      - name: Run parser tests + benchmark
        run: ./scripts/test.sh

      - name: Build app (optimized)
        run: ./scripts/build_app.sh
